<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vocab Arena – Word Memory Game</title>
<meta name="description" content="Learn English vocabulary from A1 to C2 with flashcards, timed quizzes, and sentence practice.">

<!-- PWA / installability -->
<meta name="theme-color" content="#0b0e13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vocab Arena">
<link id="apple-touch-icon" rel="apple-touch-icon">
<link id="favicon-icon" rel="icon" type="image/png">
<link id="manifest-link" rel="manifest">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e13;
    --surface: #11151c;
    --card: #161b24;
    --card2: #1c222e;
    --border: #ffffff14;
    --border2: #ffffff28;
    --text: #eef1f6;
    --muted: #8d93a3;
    --lime: #c6ff5c;
    --lime-dim: #c6ff5c22;
    --violet: #9d7bff;
    --violet-dim: #9d7bff22;
    --rose: #ff6b8a;
    --rose-dim: #ff6b8a22;
    --cyan: #5ce6e0;
    --cyan-dim: #5ce6e022;
    --amber-dim: #fbbf2422;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh; overscroll-behavior-y: none;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 15% 10%, #c6ff5c14, transparent 45%),
      radial-gradient(circle at 85% 85%, #9d7bff18, transparent 45%);
  }
  #app {
    position: relative; z-index: 1; max-width: 880px; margin: 0 auto;
    padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  }

  /* HEADER */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 11px; background: var(--lime);
    display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; color: #0b0e13; font-size: 17px; flex-shrink: 0;
  }
  .brand h1 { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
  .brand p { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .stat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    background: var(--card); border: 1px solid var(--border); border-radius: 99px;
    padding: 6px 12px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px;
    font-weight: 500; white-space: nowrap;
  }
  .pill b { color: var(--text); font-weight: 700; }
  .pill.streak b { color: var(--amber); }
  .pill.xp b { color: var(--lime); }

  /* LEVEL TRACK */
  .section-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-label-row h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
  .level-track { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .level-node {
    flex: 1; min-width: 78px; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 10px; cursor: pointer; transition: all 0.15s; text-align: center; position: relative;
  }
  .level-node:hover { border-color: var(--border2); transform: translateY(-2px); }
  .level-node.active { border-color: var(--lime); background: var(--lime-dim); }
  .level-node .lv-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); }
  .level-node.active .lv-tag { color: var(--lime); }
  .level-node .lv-name { font-size: 13px; font-weight: 600; margin-top: 3px; }
  .level-node .lv-prog { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .level-node .lv-check { position: absolute; top: 6px; right: 8px; font-size: 11px; color: var(--green); }

  /* SECTION (TOPIC) PICKER */
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 22px; }
  .topic-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; transition: all 0.15s; text-align: left; position: relative;
  }
  .topic-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .topic-card.active { border-color: var(--violet); background: var(--violet-dim); }
  .topic-card .tc-name { font-size: 13px; font-weight: 600; }
  .topic-card .tc-count { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .topic-card.active .tc-count { color: var(--violet); }
  .topic-card .tc-check { position: absolute; top: 8px; right: 10px; font-size: 11px; color: var(--green); }

  /* MODE TABS */
  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
  .mode-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 18px;
    border-radius: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  .mode-btn:hover { border-color: var(--border2); color: var(--text); }
  .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* CARD SHELL */
  .game-shell {
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 32px; min-height: 360px; position: relative; overflow: hidden;
  }
  .shell-tag {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--lime), var(--violet));
  }

  /* ============ FLASHCARD MODE ============ */
  .fc-progress { font-size: 12px; color: var(--muted); margin-bottom: 18px; display: flex; justify-content: space-between; }
  .flashcard-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .flashcard {
    width: 100%; max-width: 460px; height: 260px; position: relative; cursor: pointer;
    perspective: 1200px;
  }
  .flashcard-inner {
    width: 100%; height: 100%; position: relative; transition: transform 0.5s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center; border: 1px solid var(--border2);
  }
  .fc-front { background: var(--card2); }
  .fc-back { background: var(--violet-dim); border-color: #9d7bff44; transform: rotateY(180deg); }
  .fc-word { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .fc-phon { font-size: 13px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .fc-pos { display: inline-block; background: var(--lime-dim); color: var(--lime); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; margin-top: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  .fc-hint { font-size: 11px; color: var(--muted); margin-top: 18px; }
  .fc-def { font-size: 16px; font-weight: 600; }
  .fc-example { font-size: 13px; color: var(--text); opacity: 0.85; margin-top: 14px; font-style: italic; line-height: 1.5; }
  .fc-example .em { color: var(--violet); font-weight: 700; font-style: normal; }

  .fc-controls { display: flex; justify-content: center; gap: 12px; }
  .fc-btn {
    border: 1px solid var(--border2); background: var(--card2); color: var(--text);
    font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13px; padding: 11px 22px;
    border-radius: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }
  .fc-btn:hover { transform: translateY(-1px); }
  .fc-btn.again { color: var(--red); }
  .fc-btn.again:hover { border-color: #f8717155; background: #f8717112; }
  .fc-btn.good { color: var(--amber); }
  .fc-btn.good:hover { border-color: #fbbf2455; background: #fbbf2412; }
  .fc-btn.easy { color: var(--green); }
  .fc-btn.easy:hover { border-color: #4ade8055; background: #4ade8012; }

  /* ============ QUIZ MODE ============ */
  .quiz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .timer-ring { position: relative; width: 46px; height: 46px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 4; }
  .timer-bg { stroke: var(--border); }
  .timer-fg { stroke: var(--lime); stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .quiz-counter { font-size: 12px; color: var(--muted); }
  .quiz-q { text-align: center; margin-bottom: 28px; }
  .quiz-q-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .quiz-q-word { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; }
  .quiz-q-sub { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quiz-opt {
    background: var(--card2); border: 1px solid var(--border2); border-radius: 14px;
    padding: 16px 18px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left;
    transition: all 0.15s; font-weight: 500; line-height: 1.4;
  }
  .quiz-opt:hover { border-color: var(--lime); transform: translateY(-1px); }
  .quiz-opt.correct-opt { border-color: var(--green); background: #4ade8018; color: var(--green); }
  .quiz-opt.wrong-opt { border-color: var(--red); background: #f8717118; color: var(--red); }
  .quiz-opt.disabled { pointer-events: none; }
  .quiz-feedback { text-align: center; margin-top: 20px; font-size: 14px; font-weight: 600; min-height: 24px; }
  .quiz-feedback.ok { color: var(--green); }
  .quiz-feedback.bad { color: var(--red); }

  /* ============ SENTENCE FIX MODE ============ */
  .sf-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .sf-sentence-box {
    background: var(--card2); border: 1px solid var(--border2); border-radius: 16px;
    padding: 22px; margin-bottom: 18px;
  }
  .sf-sentence { font-size: 18px; line-height: 1.7; }
  .sf-blank-input {
    background: var(--bg); border: 1.5px solid var(--violet); border-radius: 8px;
    color: var(--lime); font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 600;
    padding: 4px 10px; min-width: 110px; outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .sf-blank-input:focus { border-color: var(--lime); box-shadow: 0 0 0 3px var(--lime-dim); }
  .sf-blank-input.correct { border-color: var(--green); color: var(--green); background: #4ade8012; }
  .sf-blank-input.wrong { border-color: var(--red); color: var(--red); background: #f8717112; }
  .sf-translation { font-size: 12px; color: var(--muted); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sf-actions { display: flex; gap: 10px; margin-top: 4px; }
  .sf-corrected {
    margin-top: 16px; padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6;
    display: none;
  }
  .sf-corrected.show { display: block; }
  .sf-corrected.ok { background: #4ade8014; border: 1px solid #4ade8040; color: var(--green); }
  .sf-corrected.bad { background: #f8717114; border: 1px solid #f8717140; }
  .sf-corrected .word-correct { color: var(--green); font-weight: 700; }
  .sf-corrected .word-wrong { color: var(--red); text-decoration: line-through; opacity: 0.7; }

  .primary-btn {
    background: var(--lime); color: #0b0e13; border: none; font-family: 'Sora', sans-serif;
    font-weight: 700; font-size: 14px; padding: 12px 26px; border-radius: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .primary-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .primary-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; transform: none; }
  .ghost-btn {
    background: transparent; color: var(--muted); border: 1px solid var(--border2);
    font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; padding: 12px 22px;
    border-radius: 12px; cursor: pointer; transition: all 0.15s;
  }
  .ghost-btn:hover { color: var(--text); border-color: var(--border2); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .es-emoji { font-size: 40px; margin-bottom: 12px; }

  /* END SCREEN */
  .end-screen { text-align: center; padding: 30px 10px; }
  .end-emoji { font-size: 52px; margin-bottom: 8px; }
  .end-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .end-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .end-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
  .end-stat { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 22px; min-width: 100px; }
  .end-stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }
  .end-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* INSTALL BANNER */
  .install-banner {
    display: none; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--lime); border-radius: 14px; padding: 12px 16px; margin-bottom: 18px;
  }
  .install-banner.show { display: flex; }
  .install-banner .ib-icon { font-size: 22px; flex-shrink: 0; }
  .install-banner .ib-text { flex: 1; min-width: 0; }
  .install-banner .ib-title { font-size: 13px; font-weight: 700; }
  .install-banner .ib-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .install-banner .ib-btn {
    background: var(--lime); color: #0b0e13; border: none; font-family: 'Sora', sans-serif;
    font-weight: 700; font-size: 12px; padding: 8px 14px; border-radius: 9px; cursor: pointer; flex-shrink: 0;
  }
  .install-banner .ib-close {
    background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer;
    padding: 4px 6px; flex-shrink: 0; line-height: 1;
  }

  .hidden { display: none !important; }

  /* ============ RESPONSIVE BREAKPOINTS ============ */

  /* Tablets and small laptops */
  @media (max-width: 900px) {
    #app { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
  }

  /* Phones */
  @media (max-width: 600px) {
    .brand h1 { font-size: 17px; }
    .brand p { font-size: 10px; }
    .brand-mark { width: 34px; height: 34px; font-size: 15px; border-radius: 9px; }
    .topbar { margin-bottom: 18px; }

    .section-label-row h2 { font-size: 11px; }
    .level-track { gap: 5px; }
    .level-node { min-width: 30%; flex: 1 1 30%; padding: 10px 6px; }
    .level-node .lv-name { font-size: 12px; }
    .level-node .lv-prog { font-size: 9px; }

    .topic-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 7px; }
    .topic-card { padding: 11px 12px; }

    .mode-row { gap: 6px; margin-bottom: 16px; }
    .mode-btn { padding: 10px 14px; font-size: 12px; flex: 1 1 auto; justify-content: center; }

    .game-shell { padding: 18px 14px; border-radius: 18px; min-height: 320px; }

    /* Flashcards */
    .flashcard { max-width: 100%; height: 230px; }
    .fc-word { font-size: 26px; }
    .fc-def { font-size: 15px; }
    .fc-example { font-size: 12.5px; }
    .fc-controls { gap: 8px; flex-wrap: wrap; }
    .fc-btn { flex: 1 1 28%; justify-content: center; padding: 12px 10px; font-size: 12px; }

    /* Quiz */
    .quiz-opts { grid-template-columns: 1fr; gap: 10px; }
    .quiz-q-word { font-size: 25px; }
    .quiz-opt { padding: 14px 16px; font-size: 13.5px; }
    .quiz-top { margin-bottom: 18px; }

    /* Sentence fix */
    .sf-sentence { font-size: 16px; }
    .sf-blank-input { min-width: 90px; font-size: 16px; }
    .sf-actions { flex-wrap: wrap; }
    .sf-actions .primary-btn, .sf-actions .ghost-btn { flex: 1 1 auto; text-align: center; }

    .primary-btn, .ghost-btn { padding: 13px 22px; font-size: 14px; }

    .end-stats { gap: 8px; }
    .end-stat { min-width: 86px; padding: 14px 16px; }
    .end-actions { flex-direction: column; width: 100%; }
    .end-actions button { width: 100%; }
  }

  /* Very narrow phones (e.g. SE-class, 360px and below) */
  @media (max-width: 380px) {
    .stat-pills { width: 100%; justify-content: flex-start; }
    .pill { font-size: 10px; padding: 5px 10px; }
    .level-node { min-width: 47%; flex: 1 1 47%; }
    .fc-btn { flex: 1 1 100%; }
    .fc-word { font-size: 23px; }
  }

  /* Landscape phones - shrink vertical paddings */
  @media (max-height: 480px) and (orientation: landscape) {
    .flashcard { height: 190px; }
    .game-shell { min-height: 240px; padding: 16px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div>
        <h1>Vocab Arena</h1>
        <p>Memorize words · fix sentences · level up</p>
      </div>
    </div>
    <div class="stat-pills">
      <div class="pill streak">🔥 <b id="streak-val">0</b></div>
      <div class="pill xp">⚡ <b id="xp-val">0</b> XP</div>
      <div class="pill">📚 <b id="mastered-val">0</b>/<span id="total-val">0</span></div>
    </div>
  </div>

  <div class="install-banner" id="install-banner">
    <span class="ib-icon">📲</span>
    <div class="ib-text">
      <div class="ib-title">Install Vocab Arena</div>
      <div class="ib-sub">Add to your home screen for quick, full-screen access</div>
    </div>
    <button class="ib-btn" id="install-btn">Install</button>
    <button class="ib-close" id="install-dismiss" aria-label="Dismiss">✕</button>
  </div>

  <div class="section-label-row"><h2>CEFR Level</h2></div>
  <div class="level-track" id="level-track"></div>

  <div class="section-label-row"><h2 id="topic-label">Topic Section</h2></div>
  <div class="topic-grid" id="topic-grid"></div>

  <div class="mode-row" id="mode-row">
    <button class="mode-btn active" data-mode="flashcard" onclick="switchMode('flashcard')">🃏 Flashcards</button>
    <button class="mode-btn" data-mode="quiz" onclick="switchMode('quiz')">⏱️ Timed Quiz</button>
    <button class="mode-btn" data-mode="sentence" onclick="switchMode('sentence')">✍️ Fix the Sentence</button>
  </div>

  <div class="game-shell">
    <div class="shell-tag"></div>
    <div id="game-area"></div>
  </div>

</div>

<script>
// ============================================================
// VOCAB DATABASE — leveled A1 -> C2, grouped by topic section

// ============================================================
// HELPERS
// ============================================================
function totalWordCount() {
  let n = 0;
  LEVELS.forEach(l => {
    const topics = VOCAB_RAW[l.id] || {};
    Object.values(topics).forEach(arr => n += arr.length);
  });
  return n;
}

function levelWordCount(level) {
  const topics = VOCAB_RAW[level] || {};
  return Object.values(topics).reduce((s, arr) => s + arr.length, 0);
}

function topicsForLevel(level) {
  return Object.keys(VOCAB_RAW[level] || {});
}

function wordsForCurrentSection() {
  if (!currentTopic) return [];
  return (VOCAB_RAW[currentLevel] && VOCAB_RAW[currentLevel][currentTopic]) || [];
}

function masteredCountInLevel(level) {
  const topics = VOCAB_RAW[level] || {};
  let count = 0;
  Object.entries(topics).forEach(([topic, arr]) => {
    arr.forEach(item => {
      if (masteredWords.has(level + '|' + topic + '|' + item.w)) count++;
    });
  });
  return count;
}

function masteredCountInTopic(level, topic) {
  const arr = (VOCAB_RAW[level] && VOCAB_RAW[level][topic]) || [];
  let count = 0;
  arr.forEach(item => { if (masteredWords.has(level + '|' + topic + '|' + item.w)) count++; });
  return count;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHTML(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ============================================================
// INIT
// ============================================================
function init() {
  document.getElementById('total-val').textContent = totalWordCount();
  buildLevelTrack();
  selectLevel('A1', true);
  updateStats();
}

function buildLevelTrack() {
  const track = document.getElementById('level-track');
  track.innerHTML = LEVELS.map((lv) => {
    const isActive = lv.id === currentLevel;
    const total = levelWordCount(lv.id);
    const mastered = masteredCountInLevel(lv.id);
    const done = total > 0 && mastered >= total;
    return `<div class="level-node ${isActive ? 'active' : ''}" data-level="${lv.id}">
      ${done ? '<span class="lv-check">✓</span>' : ''}
      <div class="lv-tag">${lv.id}</div>
      <div class="lv-name">${lv.name}</div>
      <div class="lv-prog">${mastered}/${total} words</div>
    </div>`;
  }).join('');
  track.querySelectorAll('.level-node').forEach(node => {
    node.addEventListener('click', () => selectLevel(node.dataset.level));
  });
}

function selectLevel(id, isInit) {
  currentLevel = id;
  const topics = topicsForLevel(id);
  currentTopic = topics[0] || null;
  buildLevelTrack();
  buildTopicGrid();
  if (!isInit) switchMode(currentMode);
  else switchMode('flashcard');
}

function buildTopicGrid() {
  const grid = document.getElementById('topic-grid');
  const topics = topicsForLevel(currentLevel);
  document.getElementById('topic-label').textContent = `Topic Section · ${currentLevel}`;
  grid.innerHTML = topics.map(topic => {
    const arr = VOCAB_RAW[currentLevel][topic];
    const mastered = masteredCountInTopic(currentLevel, topic);
    const isActive = topic === currentTopic;
    const done = mastered >= arr.length;
    return `<div class="topic-card ${isActive ? 'active' : ''}" data-topic="${escapeHTML(topic)}">
      ${done ? '<span class="tc-check">✓</span>' : ''}
      <div class="tc-name">${escapeHTML(topic)}</div>
      <div class="tc-count">${mastered}/${arr.length} words</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => selectTopic(card.dataset.topic));
  });
}

function selectTopic(topic) {
  currentTopic = topic;
  buildTopicGrid();
  switchMode(currentMode);
}

function updateStats() {
  document.getElementById('xp-val').textContent = xp;
  document.getElementById('streak-val').textContent = streak;
  document.getElementById('mastered-val').textContent = masteredWords.size;
}

let _audioCtx = null;
function _getCtx() {
  const wasNew = !_audioCtx;
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
  if (wasNew) setTimeout(_initCorrectSound, 100);
  return _audioCtx;
}

// Warm up AudioContext on the very first user interaction.
// Browsers block audio until the user has clicked/tapped — this ensures
// the context is running and the correct-sound buffer is decoded before
// any answer is submitted.
document.addEventListener('click', function _warmUp() {
  const ctx = _getCtx();
  if (ctx) {
    try {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      g.gain.value = 0;
      osc.connect(g).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.001);
    } catch(e) {}
    _initCorrectSound();
  }
  document.removeEventListener('click', _warmUp);
}, { once: true });

let _correctBuffer = null;

// Decode on first user gesture so it's ready instantly when needed
function _initCorrectSound() {
  const ctx = _getCtx(); if (!ctx || _correctBuffer) return;
  const bin = atob(_CORRECT_B64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  ctx.decodeAudioData(bytes.buffer.slice(0)).then(buf => { _correctBuffer = buf; }).catch(() => {});
}

function playCorrect() {
  const ctx = _getCtx(); if (!ctx) return;
  if (!_correctBuffer) {
    // Buffer not ready yet — decode now and play a quick synth ding as fallback
    _initCorrectSound();
    // synth fallback so user hears something immediately
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
    osc.connect(g).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.25);
    return;
  }
  try {
    const source = ctx.createBufferSource();
    const gain = ctx.createGain();
    source.buffer = _correctBuffer;
    gain.gain.value = 0.85;
    source.connect(gain).connect(ctx.destination);
    source.start();
  } catch(e) {}
}
function playWrong() {
  const ctx = _getCtx(); if (!ctx) return;
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = 'sawtooth'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.09, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.22);
}

function addXP(amount) {
  xp += amount;
  updateStats();
}

function refreshProgressUI() {
  buildLevelTrack();
  buildTopicGrid();
  updateStats();
}

// ============================================================
// MODE SWITCHING
// ============================================================
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  clearInterval(quizTimer);

  const words = wordsForCurrentSection();
  if (!words.length) {
    document.getElementById('game-area').innerHTML = `
      <div class="empty-state">
        <div class="es-emoji">🗂️</div>
        <div>No topic selected yet. Pick a topic section above to start.</div>
      </div>`;
    return;
  }

  if (mode === 'flashcard') renderFlashcards();
  if (mode === 'quiz') renderQuiz();
  if (mode === 'sentence') renderSentenceFix();
}

// ============================================================
// FLASHCARD MODE
// ============================================================
function renderFlashcards() {
  fcDeck = shuffle(wordsForCurrentSection());
  fcIndex = 0;
  drawFlashcard();
}

function drawFlashcard() {
  const area = document.getElementById('game-area');
  if (fcIndex >= fcDeck.length) {
    area.innerHTML = endScreenHTML('🃏', 'Deck complete!', `You reviewed all ${fcDeck.length} words in "${currentTopic}".`, [
      { val: fcDeck.length, lbl: 'Cards seen' },
      { val: xp, lbl: 'Total XP' },
    ], [
      { label: 'Review again', action: 'renderFlashcards()' },
      { label: 'Try Timed Quiz →', action: "switchMode('quiz')", primary: true },
    ]);
    return;
  }
  const item = fcDeck[fcIndex];
  const exampleHtml = escapeHTML(item.ex).replace('{w}', `<span class="em">${escapeHTML(item.w)}</span>`);
  area.innerHTML = `
    <div class="fc-progress"><span>Card ${fcIndex + 1} of ${fcDeck.length}</span><span>${currentLevel} · ${escapeHTML(currentTopic)}</span></div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-inner" id="flashcard-inner">
          <div class="fc-face fc-front">
            <div class="fc-word">${escapeHTML(item.w)}</div>
            <div class="fc-phon">${escapeHTML(item.phon)}</div>
            <div class="fc-pos">${escapeHTML(item.pos)}</div>
            <div class="fc-hint">Tap to reveal meaning</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-def">${escapeHTML(item.def)}</div>
            <div class="fc-example">${exampleHtml}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn again" id="fc-again">😵 Again</button>
      <button class="fc-btn good" id="fc-good">🙂 Good</button>
      <button class="fc-btn easy" id="fc-easy">😎 Easy</button>
    </div>
  `;
  document.getElementById('flashcard').addEventListener('click', flipCard);
  document.getElementById('fc-again').addEventListener('click', () => rateCard('again'));
  document.getElementById('fc-good').addEventListener('click', () => rateCard('good'));
  document.getElementById('fc-easy').addEventListener('click', () => rateCard('easy'));
}

function flipCard() {
  const card = document.getElementById('flashcard');
  card.classList.toggle('flipped');
}

function rateCard(rating) {
  const item = fcDeck[fcIndex];
  const key = currentLevel + '|' + currentTopic + '|' + item.w;
  if (rating === 'again') {
    streak = 0;
    addXP(1);
  } else if (rating === 'good') {
    streak++;
    masteredWords.add(key);
    addXP(3);
  } else {
    streak++;
    masteredWords.add(key);
    addXP(5);
  }
  refreshProgressUI();
  fcIndex++;
  drawFlashcard();
}

// ============================================================
// QUIZ MODE (timed MCQ)
// ============================================================
function allDefsPool() {
  // Build a pool of definitions from the same level for distractors
  const topics = VOCAB_RAW[currentLevel] || {};
  let pool = [];
  Object.values(topics).forEach(arr => arr.forEach(item => pool.push(item.def)));
  return pool;
}

function renderQuiz() {
  quizDeck = shuffle(wordsForCurrentSection());
  quizIndex = 0;
  quizScore = 0;
  drawQuizQuestion();
}

function drawQuizQuestion() {
  clearInterval(quizTimer);
  const area = document.getElementById('game-area');
  if (quizIndex >= quizDeck.length) {
    const pct = Math.round((quizScore / quizDeck.length) * 100);
    area.innerHTML = endScreenHTML(pct >= 70 ? '🏆' : '💪', pct >= 70 ? 'Nice work!' : 'Keep practicing!', `You scored ${quizScore} out of ${quizDeck.length} (${pct}%) on "${currentTopic}".`, [
      { val: quizScore, lbl: 'Correct' },
      { val: pct + '%', lbl: 'Accuracy' },
      { val: xp, lbl: 'Total XP' },
    ], [
      { label: 'Retry quiz', action: 'renderQuiz()' },
      { label: 'Fix sentences →', action: "switchMode('sentence')", primary: true },
    ]);
    return;
  }

  const item = quizDeck[quizIndex];
  const pool = allDefsPool().filter(d => d !== item.def);
  const distractors = shuffle(pool).slice(0, 3);
  const options = shuffle([item.def, ...distractors]);
  quizTimeLeft = QUIZ_TIME;
  window.__quizCorrectDef = item.def;

  area.innerHTML = `
    <div class="quiz-top">
      <div class="quiz-counter">Question ${quizIndex + 1} of ${quizDeck.length} · Score ${quizScore}</div>
      <div class="timer-ring">
        <svg width="46" height="46">
          <circle class="timer-bg" cx="23" cy="23" r="19"></circle>
          <circle class="timer-fg" id="timer-circle" cx="23" cy="23" r="19" stroke-dasharray="119" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-num" id="timer-num">${quizTimeLeft}</div>
      </div>
    </div>
    <div class="quiz-q">
      <div class="quiz-q-label">What does this word mean?</div>
      <div class="quiz-q-word">${escapeHTML(item.w)}</div>
      <div class="quiz-q-sub">${escapeHTML(item.phon)} · ${escapeHTML(item.pos)}</div>
    </div>
    <div class="quiz-opts" id="quiz-opts">
      ${options.map((opt, i) => `<button class="quiz-opt" type="button" data-opt-index="${i}">${escapeHTML(opt)}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
  `;

  document.querySelectorAll('#quiz-opts .quiz-opt').forEach((btn, i) => {
    btn.addEventListener('click', () => answerQuiz(i, options[i]));
  });

  startQuizTimer();
}

function startQuizTimer() {
  const circle = document.getElementById('timer-circle');
  const num = document.getElementById('timer-num');
  const circumference = 119;
  quizTimer = setInterval(() => {
    quizTimeLeft--;
    if (num) num.textContent = quizTimeLeft;
    if (circle) {
      const offset = circumference * (1 - quizTimeLeft / QUIZ_TIME);
      circle.style.strokeDashoffset = offset;
      circle.style.stroke = quizTimeLeft <= 4 ? 'var(--red)' : 'var(--lime)';
    }
    if (quizTimeLeft <= 0) {
      clearInterval(quizTimer);
      answerQuiz(-1, null);
    }
  }, 1000);
}

function answerQuiz(idx, chosen) {
  clearInterval(quizTimer);
  const item = quizDeck[quizIndex];
  const correctDef = window.__quizCorrectDef;
  const opts = document.querySelectorAll('#quiz-opts .quiz-opt');
  const fb = document.getElementById('quiz-feedback');
  const isCorrect = chosen === correctDef;

  opts.forEach((btn) => {
    btn.classList.add('disabled');
    const optText = btn.textContent;
    if (optText === correctDef) btn.classList.add('correct-opt');
    else if (idx !== -1 && optText === chosen) btn.classList.add('wrong-opt');
  });

  if (isCorrect) {
    quizScore++;
    streak++;
    addXP(quizTimeLeft > 6 ? 8 : 5);
    masteredWords.add(currentLevel + '|' + currentTopic + '|' + item.w);
    fb.textContent = '✓ Correct!' + (quizTimeLeft > 6 ? ' Fast answer bonus +8 XP' : ' +5 XP');
    fb.className = 'quiz-feedback ok';
    playCorrect();
  } else {
    streak = 0;
    fb.textContent = idx === -1 ? "⏱ Time's up! The correct meaning is highlighted." : '✗ Not quite. Correct meaning highlighted.';
    fb.className = 'quiz-feedback bad';
    playWrong();
  }
  refreshProgressUI();

  setTimeout(() => {
    quizIndex++;
    drawQuizQuestion();
  }, 1400);
}

// ============================================================
// SENTENCE FIX MODE (write the word, get corrected feedback)
// ============================================================
function renderSentenceFix() {
  sfDeck = shuffle(wordsForCurrentSection());
  sfIndex = 0;
  sfScore = 0;
  drawSentenceFix();
}

function drawSentenceFix() {
  const area = document.getElementById('game-area');
  if (sfIndex >= sfDeck.length) {
    const pct = Math.round((sfScore / sfDeck.length) * 100);
    area.innerHTML = endScreenHTML(pct >= 70 ? '✍️' : '📝', pct >= 70 ? 'Great writing!' : 'Good attempt!', `You correctly completed ${sfScore} of ${sfDeck.length} sentences in "${currentTopic}".`, [
      { val: sfScore, lbl: 'Correct' },
      { val: pct + '%', lbl: 'Accuracy' },
      { val: xp, lbl: 'Total XP' },
    ], [
      { label: 'Retry', action: 'renderSentenceFix()' },
      { label: 'Back to flashcards', action: "switchMode('flashcard')", primary: true },
    ]);
    return;
  }
  const item = sfDeck[sfIndex];
  const parts = item.ex.split('{w}');
  area.innerHTML = `
    <div class="sf-label">✍️ Sentence ${sfIndex + 1} of ${sfDeck.length} · Type the missing word</div>
    <div class="sf-sentence-box">
      <div class="sf-sentence">
        ${escapeHTML(parts[0])}<input type="text" class="sf-blank-input" id="sf-input" placeholder="…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="done">${escapeHTML(parts[1] || '')}
      </div>
      <div class="sf-translation">💡 Hint: ${escapeHTML(item.def)}</div>
    </div>
    <div class="sf-actions" id="sf-actions">
      <button class="primary-btn" id="sf-check-btn">Check answer</button>
      <button class="ghost-btn" id="sf-reveal-btn">Show answer</button>
    </div>
    <div class="sf-corrected" id="sf-corrected"></div>
  `;
  const input = document.getElementById('sf-input');
  document.getElementById('sf-check-btn').addEventListener('click', checkSentence);
  document.getElementById('sf-reveal-btn').addEventListener('click', revealAnswer);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkSentence(); });
  setTimeout(() => input.focus(), 50);
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/['']/g, "'");
}

function checkSentence() {
  const item = sfDeck[sfIndex];
  const input = document.getElementById('sf-input');
  const corrected = document.getElementById('sf-corrected');
  const val = normalize(input.value);
  const target = normalize(item.w);
  const isCorrect = val === target;

  input.classList.remove('correct', 'wrong');
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;

  const fullSentence = escapeHTML(item.ex).replace('{w}', `<span class="word-correct">${escapeHTML(item.w)}</span>`);

  if (isCorrect) {
    sfScore++;
    streak++;
    addXP(6);
    masteredWords.add(currentLevel + '|' + currentTopic + '|' + item.w);
    corrected.className = 'sf-corrected show ok';
    corrected.innerHTML = `✓ Correct! <strong>${escapeHTML(item.w)}</strong> ${escapeHTML(item.phon)} — ${escapeHTML(item.def)}<br><br>${fullSentence}`;
    playCorrect();
  } else {
    streak = 0;
    corrected.className = 'sf-corrected show bad';
    corrected.innerHTML = `✗ You wrote "<span class="word-wrong">${escapeHTML(input.value || '(empty)')}</span>" — the correct word is <strong>${escapeHTML(item.w)}</strong> ${escapeHTML(item.phon)}.<br>${escapeHTML(item.def)}<br><br>${fullSentence}`;
    playWrong();
  }
  refreshProgressUI();

  const actions = document.getElementById('sf-actions');
  actions.innerHTML = `<button class="primary-btn" id="sf-next-btn">Next sentence →</button>`;
  document.getElementById('sf-next-btn').addEventListener('click', nextSentence);
}

function revealAnswer() {
  const item = sfDeck[sfIndex];
  const input = document.getElementById('sf-input');
  input.value = item.w;
  checkSentence();
}

function nextSentence() {
  sfIndex++;
  drawSentenceFix();
}

// ============================================================
// SHARED END SCREEN
// ============================================================
function endScreenHTML(emoji, title, sub, stats, actions) {
  return `
    <div class="end-screen">
      <div class="end-emoji">${emoji}</div>
      <div class="end-title">${escapeHTML(title)}</div>
      <div class="end-sub">${escapeHTML(sub)}</div>
      <div class="end-stats">
        ${stats.map(s => `<div class="end-stat"><div class="end-stat-val">${escapeHTML(String(s.val))}</div><div class="end-stat-lbl">${escapeHTML(s.lbl)}</div></div>`).join('')}
      </div>
      <div class="end-actions">
        ${actions.map(a => `<button class="${a.primary ? 'primary-btn' : 'ghost-btn'}" onclick="${a.action}">${escapeHTML(a.label)}</button>`).join('')}
      </div>
    </div>
  `;
}

function setupPWA() {
  document.getElementById('apple-touch-icon').href = ICON_192;
  document.getElementById('favicon-icon').href = ICON_192;

  const manifest = {
    name: "Vocab Arena - Word Memory Game",
    short_name: "Vocab Arena",
    description: "Learn English vocabulary from A1 to C2 with flashcards, quizzes, and sentence practice.",
    start_url: ".",
    scope: ".",
    display: "standalone",
    orientation: "portrait-primary",
    background_color: "#0b0e13",
    theme_color: "#0b0e13",
    icons: [
      { src: ICON_192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: ICON_512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

  if ("serviceWorker" in navigator) {
    const swSource = [
      'const CACHE_NAME = "vocab-arena-v1";',
      'self.addEventListener("install", (event) => { self.skipWaiting(); });',
      'self.addEventListener("activate", (event) => { event.waitUntil(self.clients.claim()); });',
      'self.addEventListener("fetch", (event) => {',
      '  if (event.request.method !== "GET") return;',
      '  event.respondWith(',
      '    caches.open(CACHE_NAME).then(async (cache) => {',
      '      const cached = await cache.match(event.request);',
      '      if (cached) return cached;',
      '      try {',
      '        const response = await fetch(event.request);',
      '        if (response && response.status === 200) { cache.put(event.request, response.clone()); }',
      '        return response;',
      '      } catch (err) {',
      '        return cached || Response.error();',
      '      }',
      '    })',
      '  );',
      '});'
    ].join("\n");
    const swBlob = new Blob([swSource], { type: "application/javascript" });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => {
      // Registration can fail on file:// origins or unsupported browsers;
      // the app remains fully functional online without offline caching.
    });
  }

  let deferredInstallPrompt = null;
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('install-dismiss');

  const alreadyInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const dismissed = sessionStorageSafeGet('vocab-arena-install-dismissed');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    if (!alreadyInstalled && !dismissed) {
      banner.classList.add('show');
    }
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredInstallPrompt) { banner.classList.remove('show'); return; }
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    banner.classList.remove('show');
  });

  dismissBtn.addEventListener('click', () => {
    banner.classList.remove('show');
    sessionStorageSafeSet('vocab-arena-install-dismissed', '1');
  });

  window.addEventListener('appinstalled', () => {
    banner.classList.remove('show');
  });
}

function sessionStorageSafeGet(key) {
  try { return sessionStorage.getItem(key); } catch (e) { return null; }
}
function sessionStorageSafeSet(key, val) {
  try { sessionStorage.setItem(key, val); } catch (e) { /* ignore */ }
}


// ============================================================
// START
// ============================================================
setupPWA();
init();
</script>
